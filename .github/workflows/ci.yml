name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  container-runtime:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      BUN_UPSTREAM_IMAGE: oven/bun:1.3.14-alpine@sha256:5acc90a93e91ff07bf72aa90a7c9f0fa189765aec90b47bdbf2152d2196383c0
      CONTAINER_RUNTIME_PATCHED_BASE_IMAGE: hasna-emails-patched-bun-base:ci
      CONTAINER_RUNTIME_IMAGE: hasna-emails-runtime-contract:ci
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build and exercise the linux/amd64 scratch image
        env:
          CONTAINER_RUNTIME_KEEP_IMAGE: "1"
        run: ./scripts/container-runtime-smoke.sh
      - name: Generate scratch runtime vulnerability report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: hasna-emails-runtime-contract:ci
          format: json
          output: trivy-vulnerability-report.json
          exit-code: "0"
          ignore-unfixed: "false"
          list-all-pkgs: "true"
          vuln-type: os,library
          version: v0.70.0
      - name: Require positive runtime analyzer coverage
        run: |
          jq -e '
            (.ArtifactType == "container_image")
            and (.Metadata.OS.Family == "alpine")
            and (.Metadata.OS.Name | type == "string" and length > 0)
            and (([.Results[]? | select(.Class == "os-pkgs") | .Packages[]? | .Name] | unique | sort) == ["libgcc", "libstdc++", "musl"])
            and (([.Results[]? | select(.Class == "lang-pkgs") | .Packages[]?] | length) > 0)
          ' trivy-vulnerability-report.json >/dev/null
      - name: Generate patched Bun base vulnerability report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.CONTAINER_RUNTIME_PATCHED_BASE_IMAGE }}
          format: json
          output: trivy-patched-bun-base-report.json
          exit-code: "0"
          ignore-unfixed: "false"
          list-all-pkgs: "true"
          vuln-type: os,library
          version: v0.70.0
      - name: Require positive patched Bun base analyzer coverage
        run: |
          jq -e '
            (.ArtifactType == "container_image")
            and (.Metadata.OS.Family == "alpine")
            and (.Metadata.OS.Name | type == "string" and length > 0)
            and (([.Results[]? | select(.Class == "os-pkgs") | .Packages[]?] | length) > 0)
          ' trivy-patched-bun-base-report.json >/dev/null
      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: hasna-emails-runtime-contract:ci
          format: cyclonedx
          output: trivy.cdx.json
          exit-code: "0"
          version: v0.70.0
      - name: Preserve scanner evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-security-${{ github.sha }}
          path: |
            trivy-vulnerability-report.json
            trivy-patched-bun-base-report.json
            trivy.cdx.json
          if-no-files-found: error
          retention-days: 14
      - name: Reject high or critical scratch runtime findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: hasna-emails-runtime-contract:ci
          format: table
          exit-code: "1"
          ignore-unfixed: "false"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          version: v0.70.0
      - name: Reject high or critical patched Bun base findings
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.CONTAINER_RUNTIME_PATCHED_BASE_IMAGE }}
          format: table
          exit-code: "1"
          ignore-unfixed: "false"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          version: v0.70.0
      - name: Remove local smoke images
        if: always()
        run: docker image rm -f hasna-emails-runtime-contract:ci hasna-emails-patched-bun-base:ci || true

  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Install locked dependencies
        run: bun install --frozen-lockfile
      - name: Test in isolated local mode
        run: |
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          env -u MAILERY_MODE -u HASNA_MAILERY_MODE \
            -u MAILERY_STORAGE_MODE -u HASNA_MAILERY_STORAGE_MODE \
            -u EMAILS_STORAGE_MODE -u HASNA_EMAILS_STORAGE_MODE \
            -u MAILERY_API_URL -u MAILERY_API_KEY \
            -u HASNA_MAILERY_API_URL -u HASNA_MAILERY_API_KEY \
            -u MAILERY_CLOUD_API_URL -u MAILERY_CLOUD_TOKEN \
            -u HASNA_MAILERY_ENV_FILE -u HASNA_EMAILS_MODE \
            -u EMAILS_SELF_HOSTED_URL -u EMAILS_SELF_HOSTED_API_KEY \
            -u CLOUDFLARE_API_TOKEN -u CLOUDFLARE_API_KEY \
            -u CLOUDFLARE_EMAIL -u CLOUDFLARE_ACCOUNT_ID \
            -u AWS_ACCESS_KEY_ID -u AWS_SECRET_ACCESS_KEY -u AWS_SESSION_TOKEN \
            -u AWS_PROFILE -u AWS_DEFAULT_PROFILE -u AWS_ACCOUNT_ID \
            -u AWS_REGION -u AWS_DEFAULT_REGION -u AWS_SHARED_CREDENTIALS_FILE \
            -u AWS_CONFIG_FILE -u AWS_WEB_IDENTITY_TOKEN_FILE -u AWS_ROLE_ARN \
            -u AWS_ROLE_SESSION_NAME -u AWS_CONTAINER_CREDENTIALS_RELATIVE_URI \
            -u AWS_CONTAINER_CREDENTIALS_FULL_URI -u AWS_CONTAINER_AUTHORIZATION_TOKEN \
            -u EMAILS_AWS_REGION -u EMAILS_SES_AWS_PROFILE \
            -u RESEND_API_KEY -u RESEND_WEBHOOK_SECRET \
            -u BRANDSIGHT_API_KEY -u BRANDSIGHT_API_SECRET -u BRANDSIGHT_CUSTOMER_ID \
            AWS_EC2_METADATA_DISABLED=true \
            HOME="$tmp_home" EMAILS_MODE=local EMAILS_DB_PATH=:memory: bun test
      - name: Build
        run: bun run build
      - name: Verify canonical public package identity
        run: |
          bun -e '
            import pkg from "./package.json" with { type: "json" };
            if (pkg.name !== "@hasna/emails") throw new Error(`unexpected package name: ${pkg.name}`);
            if (pkg.publishConfig?.access !== "public") throw new Error("npm package must publish with public access");
            if (pkg.publishConfig?.registry !== "https://registry.npmjs.org") throw new Error("npm registry must be the public registry");
            if (pkg.repository?.url !== "git+https://github.com/hasna/emails.git") throw new Error("repository provenance must be hasna/emails");
          '
      - name: Verify generated SDK is committed
        run: |
          bun run scripts/generate-selfhost-sdk.ts
          git diff --exit-code -- src/selfhost.ts
      - name: Verify hosted-control-plane boundary
        run: |
          bun run no-cloud:source
          bun run no-cloud:pack
      - name: Diff hygiene
        run: git diff --check

  selfhost-postgres:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16.4-alpine3.20@sha256:5660c2cbfea50c7a9127d17dc4e48543eedd3d7a41a595a2dfa572471e37e64c
        env:
          POSTGRES_USER: emails_test
          POSTGRES_PASSWORD: emails_test
          POSTGRES_DB: emails_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U emails_test -d emails_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Verify self-hosted Postgres migrations, tenancy, RLS, and message IDs
        env:
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: emails_test
          PGPASSWORD: emails_test
          PGDATABASE: emails_test
        run: |
          scheme=postgresql
          export EMAILS_TEST_POSTGRES_URL="${scheme}://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=disable"
          bun test src/server/self-hosted/postgres.integration.test.ts
          bun test src/server/self-hosted/multi-tenancy.integration.test.ts
          bun test src/server/self-hosted/message-id-resolution.integration.test.ts
          bun test src/server/self-hosted/rls.integration.test.ts
